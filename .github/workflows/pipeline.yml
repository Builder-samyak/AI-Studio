name: RadiScan — ClearML Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'main.py'
      - 'requirements.txt'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write ClearML credentials
        env:
          CLEARML_API_ACCESS_KEY: ${{ secrets.CLEARML_API_ACCESS_KEY }}
          CLEARML_API_SECRET_KEY: ${{ secrets.CLEARML_API_SECRET_KEY }}
        run: |
          mkdir -p ~/.clearml
          python3 -c "
          import os
          key = os.environ['CLEARML_API_ACCESS_KEY']
          secret = os.environ['CLEARML_API_SECRET_KEY']
          conf = '''api {
            web_server: https://app.clear.ml
            api_server: https://api.clear.ml
            files_server: https://files.clear.ml
            credentials {
              access_key: \"''' + key + '''\"
              secret_key: \"''' + secret + '''\"
            }
          }'''
          open(os.path.expanduser('~/.clearml/clearml.conf'), 'w').write(conf)
          print('Credentials written.')
          "

      - name: Trigger ClearML Pipeline
        env:
          CLEARML_API_ACCESS_KEY: ${{ secrets.CLEARML_API_ACCESS_KEY }}
          CLEARML_API_SECRET_KEY: ${{ secrets.CLEARML_API_SECRET_KEY }}
        run: python main.py
